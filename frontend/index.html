<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP 工具调用监控</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MCP 工具调用监控系统</h1>
        <div class="controls">
          <button id="refreshBtn" class="btn btn-primary">刷新</button>
          <button id="clearBtn" class="btn btn-danger">清除数据</button>
          <select id="filterStatus" class="select">
            <option value="">所有状态</option>
            <option value="success">成功</option>
            <option value="error">错误</option>
            <option value="pending">进行中</option>
          </select>
        </div>
      </header>

      <section class="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalCalls">0</div>
          <div class="stat-label">总调用次数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="successfulCalls">0</div>
          <div class="stat-label">成功</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="failedCalls">0</div>
          <div class="stat-label">失败</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgDuration">0</div>
          <div class="stat-label">平均耗时(ms)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="toolCount">0</div>
          <div class="stat-label">工具数量</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="serverCount">0</div>
          <div class="stat-label">服务器数量</div>
        </div>
      </section>

      <section class="content">
        <div class="panel">
          <h2>调用记录</h2>
          <div class="table-container">
            <table id="callsTable">
              <thead>
                <tr>
                  <th>Session ID</th>
                  <th>工具</th>
                  <th>服务器</th>
                  <th>时间</th>
                  <th>耗时</th>
                  <th>状态</th>
                  <th>参数</th>
                </tr>
              </thead>
              <tbody id="callsBody"></tbody>
            </table>
          </div>
        </div>

        <div class="panel" style="display: none">
          <h2>调用关系图</h2>
          <div class="chart-container">
            <svg id="callGraph" width="100%" height="400"></svg>
          </div>
        </div>

        <div class="panel">
          <h2>工具使用统计</h2>
          <div class="chart-container">
            <canvas id="toolChart"></canvas>
          </div>
        </div>

        <div class="panel">
          <h2>服务器使用统计</h2>
          <div class="chart-container">
            <canvas id="serverChart"></canvas>
          </div>
        </div>

        <div class="panel">
          <h2>性能分析</h2>
          <div id="performance"></div>
        </div>

        <div class="panel">
          <h2>常见工具组合</h2>
          <div id="usagePatterns"></div>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
